<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Markdown Symbol -->
  <g transform="translate(50, 50)">
    <rect width="100" height="100" rx="8" fill="#22C55E" opacity="0.15"/>
    <text x="50" y="72" font-family="Arial Black, sans-serif" font-size="60" font-weight="bold" fill="#22C55E" text-anchor="middle">M↓</text>
  </g>
  
  <!-- Title -->
  <text x="180" y="95" font-family="Arial Black, sans-serif" font-size="48" font-weight="bold" fill="url(#textGradient)">MARKDOWN</text>
  <text x="540" y="95" font-family="Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">GUIDE</text>
  
  <!-- Subtitle -->
  <text x="180" y="140" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">Master the Art of Documentation</text>
  
  <!-- Decorative elements -->
  <circle cx="750" cy="40" r="25" fill="#22C55E" opacity="0.1"/>
  <circle cx="720" cy="160" r="15" fill="#22C55E" opacity="0.15"/>
</svg>
